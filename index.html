<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Draw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0F0C29;
    --bg-mid:#1B1640;
    --panel:#221C4C;
    --panel-line:#352C6E;
    --card-a:#4C3A9C;
    --card-b:#2A2168;
    --gold:#F5B942;
    --gold-soft:#FFDE9E;
    --cyan:#3DDBD9;
    --pink:#FF8FD6;
    --green:#5FD97A;
    --slate:#8B85B8;
    --danger:#FF8B8B;
    --text:#F5F3FF;
    --text-muted:#9C93C4;
    --font-display:'Space Grotesk', 'Arial Black', sans-serif;
    --font-body:'Inter', -apple-system, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 10%, rgba(61,219,217,0.10), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(245,185,66,0.10), transparent 45%),
      linear-gradient(160deg, var(--bg-deep), var(--bg-mid));
    font-family:var(--font-body);
    color:var(--text);
    overflow-x:hidden;
    padding:28px 20px 60px;
  }

  .sparkle-field{position:fixed; inset:0; pointer-events:none; z-index:0;}
  .sparkle{
    position:absolute; width:3px; height:3px; border-radius:50%;
    background:var(--gold-soft); opacity:0.5;
    animation:drift 8s ease-in-out infinite;
  }
  @keyframes drift{
    0%,100%{ transform:translateY(0) scale(1); opacity:0.2; }
    50%{ transform:translateY(-22px) scale(1.6); opacity:0.7; }
  }

  .stage{ position:relative; z-index:1; max-width:1120px; margin:0 auto; }

  header{ text-align:center; margin-bottom:26px; }
  .eyebrow{
    font-family:var(--font-body); font-weight:600; letter-spacing:0.24em;
    font-size:12px; text-transform:uppercase; color:var(--cyan);
    margin-bottom:10px;
  }
  h1{
    font-family:var(--font-display); font-weight:700;
    font-size:clamp(34px, 6vw, 58px); line-height:1;
    background:linear-gradient(100deg, var(--gold-soft), var(--gold) 45%, #fff 55%, var(--gold) 70%);
    background-size:220% auto;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation:shine 5s linear infinite;
  }
  @keyframes shine{ to{ background-position:-220% center; } }
  header p{ margin-top:10px; color:var(--text-muted); font-size:14px; }

  .layout{ display:grid; grid-template-columns:1fr 300px; gap:28px; align-items:start; }
  @media (max-width:860px){ .layout{ grid-template-columns:1fr; } }

  .board{ background:rgba(255,255,255,0.02); border:1px solid var(--panel-line); border-radius:20px; padding:26px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(110px, 1fr)); gap:14px; }

  .box{ all:unset; cursor:pointer; aspect-ratio:3/4; perspective:900px; border-radius:14px; }
  .box:focus-visible .box-inner{ outline:2px solid var(--cyan); outline-offset:3px; }
  .box.locked{ cursor:default; }

  .box-inner{ position:relative; width:100%; height:100%; transition:transform 0.6s cubic-bezier(.2,.9,.25,1); transform-style:preserve-3d; }
  .box.opened .box-inner{ transform:rotateY(180deg); }
  .box:not(.opened):hover .box-inner{ transform:translateY(-4px) rotateY(0deg) scale(1.02); }

  .box-face{
    position:absolute; inset:0; border-radius:14px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    backface-visibility:hidden; padding:6px; text-align:center;
  }
  .box-front{
    background:linear-gradient(150deg, var(--card-a), var(--card-b));
    border:1px solid rgba(255,255,255,0.10);
    box-shadow:0 8px 20px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .box-front .gift-icon{ font-size:26px; margin-bottom:6px; }
  .box-front .num{ font-family:var(--font-display); font-size:11px; letter-spacing:0.08em; color:var(--text-muted); }
  .box-front::before{
    content:''; position:absolute; inset:0; border-radius:14px;
    background:linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.10) 50%, transparent 70%);
    background-size:220% 220%;
    animation:sheen 4.5s ease-in-out infinite;
  }
  @keyframes sheen{ 0%{ background-position:200% 0; } 100%{ background-position:-40% 0; } }

  .box-back{
    background:var(--panel);
    border:1px solid var(--panel-line);
    transform:rotateY(180deg);
    gap:3px;
  }
  .box-back .prize-icon{ font-size:22px; }
  .box-back .prize-name{ font-size:10px; font-weight:600; line-height:1.2; color:var(--text); }
  .box-back .claimed-by{ font-size:9px; color:var(--text-muted); margin-top:2px; }
  .box.opened.is-tryagain .box-back .prize-name{ color:var(--slate); }
  .box.opened:not(.is-tryagain) .box-back{ box-shadow:0 0 0 2px var(--prize-color, var(--gold)) inset; }

  .sidebar{ background:rgba(255,255,255,0.02); border:1px solid var(--panel-line); border-radius:20px; padding:22px; }
  .sidebar h2{ font-family:var(--font-display); font-size:13px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); margin-bottom:14px; }
  .prize-row{ display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--panel-line); }
  .prize-row:last-child{ border-bottom:none; }
  .prize-row .swatch{ width:32px; height:32px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; background:rgba(255,255,255,0.06); }
  .prize-row .info{ flex:1; min-width:0; }
  .prize-row .info .name{ font-size:12px; font-weight:600; color:var(--text); }
  .prize-row .info .count{ font-size:11px; color:var(--text-muted); margin-top:1px; }
  .prize-row .count.empty{ color:var(--slate); text-decoration:line-through; }

  .board-footer{ margin-top:20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  .progress-text{ font-size:13px; color:var(--text-muted); }
  .progress-text b{ color:var(--text); }
  .ghost-btn{
    font-family:var(--font-body); font-weight:600; font-size:13px;
    background:transparent; color:var(--text-muted);
    border:1px solid var(--panel-line); border-radius:8px;
    padding:9px 16px; cursor:pointer; transition:all 0.2s;
  }
  .ghost-btn:hover{ color:var(--text); border-color:var(--cyan); }

  .screen{ max-width:400px; margin:20px auto; text-align:center; padding:0 6px; }
  .field{ margin-bottom:14px; text-align:left; }
  .field label{ font-size:12px; color:var(--text-muted); margin-bottom:6px; display:block; font-weight:600; }
  .field input{ width:100%; padding:13px 14px; border-radius:10px; border:1px solid var(--panel-line); background:rgba(255,255,255,0.04); color:var(--text); font-size:15px; font-family:var(--font-body); }
  .field input:focus{ outline:2px solid var(--cyan); border-color:transparent; }

  .primary-btn{ width:100%; padding:14px; border-radius:12px; border:none; background:var(--gold); color:#1A1540; font-weight:700; font-size:15px; cursor:pointer; font-family:var(--font-body); transition:transform 0.15s; }
  .primary-btn:hover{ transform:translateY(-1px); }

  .error-text{ color:var(--danger); font-size:12px; margin-top:10px; min-height:14px; }

  .winners-row{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--panel-line); font-size:12px; }
  .winners-row:last-child{ border-bottom:none; }
  .winners-row .w-icon{ font-size:16px; }
  .winners-row .w-info{ flex:1; min-width:0; }
  .winners-row .w-info .w-name{ font-weight:600; color:var(--text); }
  .winners-row .w-info .w-meta{ color:var(--text-muted); font-size:11px; }

  .confetti-layer{ position:fixed; inset:0; pointer-events:none; z-index:60; overflow:hidden; }
  .confetti-piece{ position:absolute; top:-20px; width:8px; height:14px; opacity:0.95; animation:fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(110vh) rotate(540deg); opacity:0.3; } }
</style>
</head>
<body>

<div class="sparkle-field" id="sparkleField"></div>
<div class="stage" id="app"></div>
<div class="confetti-layer" id="confettiLayer"></div>

<script>
  const PRIZES = [
    { id:'earphone', name:'Xiaomi Earphone AirPlus 5', icon:'🎧', qty:5, color:'#3DDBD9' },
    { id:'band',     name:'Xiaomi Band Watch 5',        icon:'⌚', qty:1, color:'#FF8FD6' },
    { id:'laptop',   name:'Honor Madbook 3',             icon:'💻', qty:1, color:'#F5B942' },
    { id:'voucher',  name:'Cash Voucher RM50',           icon:'💵', qty:3, color:'#5FD97A' },
    { id:'tryagain', name:'Try Again Later',             icon:'🍀', qty:10, color:'#8B85B8', isTryAgain:true }
  ];
  const TOTAL_SLOTS = PRIZES.reduce((sum, p) => sum + p.qty, 0);

  let board = [];         // {prizeId, claimedBy, claimedName, claimedPhone}
  let winners = [];       // {name, phone, prizeId, boxIndex}
  let pendingIndex = null;
  let screen = 'pick';    // 'pick' | 'claim' | 'result' | 'winners'

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function buildBoard(){
    const pool = [];
    PRIZES.forEach(p => { for(let i = 0; i < p.qty; i++) pool.push({ prizeId:p.id, claimedBy:null, claimedName:null, claimedPhone:null }); });
    return shuffle(pool);
  }

  function remainingCounts(){
    const counts = {};
    PRIZES.forEach(p => counts[p.id] = p.qty);
    board.forEach(slot => { if(slot.claimedBy) counts[slot.prizeId]--; });
    return counts;
  }

  function openedCount(){
    return board.filter(s => s.claimedBy).length;
  }

  function poolHtml(){
    const remaining = remainingCounts();
    return PRIZES.map(p => `
      <div class="prize-row">
        <div class="swatch">${p.icon}</div>
        <div class="info">
          <div class="name">${p.name}</div>
          <div class="count ${remaining[p.id] === 0 ? 'empty' : ''}">${remaining[p.id]} of ${p.qty} left</div>
        </div>
      </div>`).join('');
  }

  function render(){
    const app = document.getElementById('app');
    if(screen === 'pick') app.innerHTML = renderPickHTML();
    else if(screen === 'claim') app.innerHTML = renderClaimHTML();
    else if(screen === 'winners') app.innerHTML = renderWinnersHTML();
    else app.innerHTML = renderResultHTML();
  }

  function renderPickHTML(){
    const boxes = board.map((slot, i) => {
      const taken = !!slot.claimedBy;
      const prize = PRIZES.find(p => p.id === slot.prizeId);
      return `
        <button class="box ${taken ? 'locked opened' : ''} ${taken && prize.isTryAgain ? 'is-tryagain' : ''}"
                ${taken ? 'disabled' : `data-action="pick" data-index="${i}"`}>
          <div class="box-inner">
            <div class="box-face box-front">
              <div class="gift-icon">🎁</div>
              <div class="num">BOX ${i + 1}</div>
            </div>
            <div class="box-face box-back" style="--prize-color:${prize.color}">
              <div class="prize-icon">${taken ? prize.icon : ''}</div>
              <div class="prize-name">${taken ? prize.name : ''}</div>
              ${taken && slot.claimedName ? `<div class="claimed-by">${escapeHtml(slot.claimedName)}</div>` : ''}
            </div>
          </div>
        </button>`;
    }).join('');

    return `
      <header>
        <div class="eyebrow">Team Icebreaker</div>
        <h1>LUCKY DRAW</h1>
        <p>Tap any box to take your turn.</p>
      </header>
      <div class="layout">
        <div class="board">
          <div class="grid">${boxes}</div>
          <div class="board-footer">
            <div class="progress-text"><b>${openedCount()}</b> of <b>${TOTAL_SLOTS}</b> boxes opened</div>
            <div style="display:flex; gap:8px;">
              <button class="ghost-btn" data-action="show-winners">📋 Winners (${winners.length})</button>
              <button class="ghost-btn" data-action="reset-game">↻ Reset game</button>
            </div>
          </div>
        </div>
        <div class="sidebar">
          <h2>Prize Pool</h2>
          ${poolHtml()}
        </div>
      </div>
    `;
  }

  function renderClaimHTML(){
    const prize = PRIZES.find(p => p.id === board[pendingIndex].prizeId);
    return `
      <header>
        <div class="eyebrow">Box ${pendingIndex + 1}</div>
        <h1 style="font-size:clamp(28px,5vw,44px);">You Won!</h1>
      </header>
      <div class="screen">
        <span style="font-size:56px;display:block;">${prize.icon}</span>
        <div style="font-size:18px;font-weight:600;color:var(--gold-soft);margin:10px 0 20px;">${prize.name}</div>
        <p style="color:var(--text-muted);font-size:13px;margin-bottom:18px;">Enter your details to claim this prize.</p>
        <div class="field">
          <label for="claimName">Your name</label>
          <input id="claimName" type="text" placeholder="e.g. Alex Tan" autocomplete="name">
        </div>
        <div class="field">
          <label for="claimPhone">Phone number</label>
          <input id="claimPhone" type="tel" placeholder="e.g. 012-3456789" autocomplete="tel">
        </div>
        <button class="primary-btn" data-action="submit-claim">Submit &amp; Claim →</button>
        <p class="error-text" id="claimError"></p>
      </div>
    `;
  }

  function renderResultHTML(){
    const slot = board[pendingIndex];
    const prize = PRIZES.find(p => p.id === slot.prizeId);
    const isTry = !!prize.isTryAgain;
    return `
      <header>
        <div class="eyebrow">Box ${pendingIndex + 1}</div>
        <h1 style="font-size:clamp(28px,5vw,44px);">${isTry ? 'So close!' : 'Prize Claimed!'}</h1>
      </header>
      <div class="screen">
        <span style="font-size:64px;display:block;">${prize.icon}</span>
        <div style="font-size:18px;font-weight:600;color:${isTry ? 'var(--slate)' : 'var(--gold-soft)'};margin:10px 0 14px;">
          ${isTry ? prize.name : prize.name}
        </div>
        <p style="color:var(--text-muted);font-size:13px;margin-bottom:26px;">
          ${isTry ? 'No prize this time — thanks for playing!' : `Thanks ${escapeHtml(slot.claimedName)}! Show this screen to the host to collect your prize.`}
        </p>
        <button class="primary-btn" data-action="next-player">Next Player →</button>
      </div>
    `;
  }

  function renderWinnersHTML(){
    const rows = winners.length ? winners.map(w => {
      const prize = PRIZES.find(p => p.id === w.prizeId);
      return `
        <div class="winners-row">
          <div class="w-icon">${prize.icon}</div>
          <div class="w-info">
            <div class="w-name">${escapeHtml(w.name)} — ${prize.name}</div>
            <div class="w-meta">${escapeHtml(w.phone)} · Box ${w.boxIndex + 1}</div>
          </div>
        </div>`;
    }).join('') : `<p style="color:var(--text-muted);font-size:13px;">No prizes claimed yet.</p>`;

    return `
      <header>
        <div class="eyebrow">Host Record</div>
        <h1 style="font-size:clamp(28px,5vw,44px);">Winners List</h1>
        <p>Names and numbers collected so far — for prize collection follow-up.</p>
      </header>
      <div class="screen" style="max-width:460px;">
        <div class="sidebar" style="text-align:left;">
          ${rows}
        </div>
        <button class="primary-btn" style="margin-top:20px;" data-action="back-to-game">← Back to Game</button>
      </div>
    `;
  }

  function handlePick(index){
    if(board[index].claimedBy) return;
    board[index].claimedBy = true;
    pendingIndex = index;
    const prize = PRIZES.find(p => p.id === board[index].prizeId);
    if(prize.isTryAgain){
      screen = 'result';
    } else {
      screen = 'claim';
      launchConfetti();
    }
    render();
  }

  function handleSubmitClaim(){
    const name = document.getElementById('claimName').value.trim();
    const phone = document.getElementById('claimPhone').value.trim();
    const errorEl = document.getElementById('claimError');
    if(!name || !phone){ errorEl.textContent = 'Please fill in both name and phone number.'; return; }
    if(phone.replace(/\D/g, '').length < 8){ errorEl.textContent = 'Please enter a valid phone number.'; return; }

    board[pendingIndex].claimedName = name;
    board[pendingIndex].claimedPhone = phone;
    winners.push({ name, phone, prizeId: board[pendingIndex].prizeId, boxIndex: pendingIndex });
    screen = 'result';
    render();
  }

  function handleNextPlayer(){
    pendingIndex = null;
    screen = 'pick';
    render();
  }

  function handleShowWinners(){ screen = 'winners'; render(); }
  function handleBackToGame(){ screen = 'pick'; render(); }

  function handleResetGame(){
    if(!confirm('Reset the board? All boxes will be re-shuffled and the winners list cleared.')) return;
    board = buildBoard();
    winners = [];
    pendingIndex = null;
    screen = 'pick';
    render();
  }

  document.getElementById('app').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if(!btn) return;
    const action = btn.dataset.action;
    if(action === 'pick') handlePick(parseInt(btn.dataset.index, 10));
    else if(action === 'submit-claim') handleSubmitClaim();
    else if(action === 'next-player') handleNextPlayer();
    else if(action === 'show-winners') handleShowWinners();
    else if(action === 'back-to-game') handleBackToGame();
    else if(action === 'reset-game') handleResetGame();
  });

  document.getElementById('app').addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && screen === 'claim'){
      const target = e.target;
      if(target.id === 'claimName' || target.id === 'claimPhone') handleSubmitClaim();
    }
  });

  function launchConfetti(){
    const colors = ['#F5B942', '#3DDBD9', '#FF8FD6', '#5FD97A', '#FFDE9E'];
    const layer = document.getElementById('confettiLayer');
    for(let i = 0; i < 70; i++){
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (2.2 + Math.random() * 1.6) + 's';
      el.style.animationDelay = (Math.random() * 0.4) + 's';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      layer.appendChild(el);
      setTimeout(() => el.remove(), 4500);
    }
  }

  const sparkleField = document.getElementById('sparkleField');
  for(let i = 0; i < 26; i++){
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.animationDelay = (Math.random() * 8) + 's';
    s.style.animationDuration = (6 + Math.random() * 6) + 's';
    sparkleField.appendChild(s);
  }

  board = buildBoard();
  render();
</script>
</body>
</html>
